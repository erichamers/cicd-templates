on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
      SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
      SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PAT }}
      SNOWFLAKE_AUTHENTICATOR: programmatic_access_token
    steps:
      - name: Checkout cicd-templates
        uses: actions/checkout@v4
        with:
          repository: erichamers/cicd-templates
          ref: main
      - name: Install Snowflake CLI
        uses: snowflakedb/snowflake-cli-action@v2.0
      - name: Test connection
        run: snow connection test -x
      - name: Run SQL
        run: snow sql -q "SELECT CURRENT_USER(), CURRENT_ROLE(), '${{ inputs.environment }}' AS ENVIRONMENT" -x