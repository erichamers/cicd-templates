on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SNOWFLAKE_ACCOUNT: ${{ vars.SNOWFLAKE_ACCOUNT }}
      SNOWFLAKE_USER: ${{ vars.SNOWFLAKE_USER }}
      SNOWFLAKE_ROLE: ${{ vars.SNOWFLAKE_ROLE }}
      SNOWFLAKE_WAREHOUSE: ${{ vars.SNOWFLAKE_WAREHOUSE }}
      SNOWFLAKE_DATABASE: ${{ vars.SNOWFLAKE_DATABASE }}
      SNOWFLAKE_SCHEMA: ${{ vars.SNOWFLAKE_SCHEMA }}
      SNOWFLAKE_AUTHENTICATOR: SNOWFLAKE_JWT
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Decode private key
        run: |
          echo "${{ secrets.SNOWFLAKE_PRIVATE_KEY_B64 }}" | base64 -d > rsa_key.pem
          chmod 600 rsa_key.pem
          echo "SNOWFLAKE_PRIVATE_KEY_FILE=$(pwd)/rsa_key.pem" >> $GITHUB_ENV

      - name: Install Snowflake CLI
        uses: snowflakedb/snowflake-cli-action@v2.0

      - name: Deploy dbt project
        run: |
          snow dbt deploy pharma_shipments \
            --source ./export_sample_project \
            --database ${{ vars.SNOWFLAKE_DATABASE }} \
            --schema ${{ vars.SNOWFLAKE_SCHEMA }} \
            --force \
            --install-local-deps \
            -x

      - name: Configure named connection
        run: |
          snow connection add \
            --connection-name ci \
            --account ${{ vars.SNOWFLAKE_ACCOUNT }} \
            --user ${{ vars.SNOWFLAKE_USER }} \
            --private-key-file rsa_key.pem \
            --authenticator SNOWFLAKE_JWT \
            --role ${{ vars.SNOWFLAKE_ROLE }} \
            --warehouse ${{ vars.SNOWFLAKE_WAREHOUSE }} \
            --no-interactive

      - name: Execute dbt run
        run: |
          snow dbt execute pharma_shipments run \
            --database ${{ vars.SNOWFLAKE_DATABASE }} \
            --schema ${{ vars.SNOWFLAKE_SCHEMA }} \
            --connection ci